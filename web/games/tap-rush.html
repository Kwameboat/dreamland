<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Tap Rush</title>
<style>body{margin:0;background:#0a0a0a;color:#fff;font-family:Segoe UI,sans-serif;text-align:center;padding:24px}button{padding:16px 32px;border:0;border-radius:16px;background:#ff0055;color:#fff;font-size:18px;font-weight:700}</style></head>
<body><h3>Tap Rush</h3><p>Score: <span id="s">0</span></p><button id="t">TAP</button>
<script>let s=0;document.getElementById('t').onclick=()=>{s++;document.getElementById('s').textContent=s};</script></body></html>
