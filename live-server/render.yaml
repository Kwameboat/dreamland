# Dreamland Live WebRTC SFU — Render Blueprint
# Dashboard: New → Blueprint → connect repo Kwameboat/dreamland
# Or: New Web Service → Root Directory: live-server

services:
  - type: web
    name: dreamland-live
    runtime: node
    rootDir: live-server
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DREAMLAND_LIVE_DEPLOY
        value: render
      - key: DREAMLAND_LIVE_CORS
        value: https://dreamlandgh.app
      - key: DREAMLAND_LIVE_SECRET
        generateValue: true
