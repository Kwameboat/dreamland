<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /app/api/web

    SetEnvIf X-Forwarded-Proto "https" HTTPS=on

    # Uploaded media is stored under api/runtime/uploads but exposed at this URL path.
    Alias /frontend/web/uploads /app/api/runtime/uploads
    <Directory /app/api/runtime/uploads>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Directory /app/api/web>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
